name: Publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm --filter react-crash-guard build

      - name: Copy README and LICENSE into package
        run: cp README.md LICENSE packages/core/

      - name: Publish to npm
        working-directory: packages/core
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view react-crash-guard@$VERSION version 2>/dev/null; then
            echo "react-crash-guard@$VERSION already published, skipping"
          else
            pnpm publish --no-git-checks --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Set up Node.js for GitHub Packages
        uses: actions/setup-node@v4
        with:
          registry-url: "https://npm.pkg.github.com"

      - name: Publish to GitHub Packages
        working-directory: packages/core
        run: |
          VERSION=$(node -p "require('./package.json').version")
          npm pkg set name="@mughalhere/react-crash-guard"
          npm pkg set publishConfig.registry="https://npm.pkg.github.com"
          if npm view @mughalhere/react-crash-guard@$VERSION version 2>/dev/null; then
            echo "@mughalhere/react-crash-guard@$VERSION already published, skipping"
          else
            pnpm publish --no-git-checks --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
